<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Statistiques</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="page-header">
        <h1>Statistiques</h1>
        <p>Taux de remplissage par seance et recettes par film.</p>
    </div>

    <section class="stats-section">
        <h2>Taux de remplissage par seance</h2>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Seance</th>
                    <th>Film</th>
                    <th>Salle</th>
                    <th>Billets vendus</th>
                    <th>Capacite</th>
                    <th>Taux</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${tauxRemplissage}">
                    <td th:text="${#temporals.format(item.seance.dateHeure, 'dd/MM/yyyy HH:mm')}">Date</td>
                    <td class="fw-semibold" th:text="${item.seance.film.titre}">Film</td>
                    <td th:text="${item.seance.salle}">Salle</td>
                    <td th:text="${item.billetsVendus}">0</td>
                    <td th:text="${item.seance.capaciteSalle}">100</td>
                    <td>
                        <div class="progress" role="progressbar">
                            <div class="progress-bar" th:style="'width:' + ${item.taux > 100 ? 100 : item.taux} + '%'" th:text="${#numbers.formatDecimal(item.taux, 1, 1) + '%'}">0%</div>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(tauxRemplissage)}">
                    <td colspan="6" class="text-center text-muted py-4">Aucune seance disponible.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="stats-section mt-4">
        <div class="d-flex justify-content-between align-items-center gap-3">
            <h2>Recettes par film</h2>
            <strong>Total: <span th:text="${totalRecettes}">0</span> DH</strong>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Film</th>
                    <th>Recette</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${recettesParFilm}">
                    <td class="fw-semibold" th:text="${item.titreFilm}">Film</td>
                    <td><span th:text="${item.recette}">0</span> DH</td>
                </tr>
                <tr th:if="${#lists.isEmpty(recettesParFilm)}">
                    <td colspan="2" class="text-center text-muted py-4">Aucune recette disponible.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
