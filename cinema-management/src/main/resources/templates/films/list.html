<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Films</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="page-header d-flex justify-content-between align-items-center gap-3">
        <div>
            <h1>Films</h1>
            <p>Catalogue des films programmes.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/films/new}">Ajouter</a>
    </div>

    <form class="filter-bar" method="get" th:action="@{/films}">
        <input class="form-control" type="text" name="genre" placeholder="Filtrer par genre" th:value="${genre}">
        <button class="btn btn-outline-primary" type="submit">Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/films}">Reset</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Titre</th>
                <th>Genre</th>
                <th>Duree</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="film : ${films}">
                <td th:text="${film.id}">1</td>
                <td class="fw-semibold" th:text="${film.titre}">Titre</td>
                <td th:text="${film.genre}">Genre</td>
                <td><span th:text="${film.dureeMin}">120</span> min</td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/films/{id}/edit(id=${film.id})}">Modifier</a>
                    <form class="d-inline" method="post" th:action="@{/films/{id}/delete(id=${film.id})}">
                        <button class="btn btn-sm btn-outline-danger" type="submit">Supprimer</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(films)}">
                <td colspan="5" class="text-center text-muted py-4">Aucun film trouve.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
