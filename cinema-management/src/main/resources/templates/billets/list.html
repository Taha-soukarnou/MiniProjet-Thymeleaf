<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Billets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="page-header d-flex justify-content-between align-items-center gap-3">
        <div>
            <h1>Billets</h1>
            <p>Ventes, annulations et historique des tickets.</p>
        </div>
        <a class="btn btn-success" th:href="@{/billets/new}">Vendre un billet</a>
    </div>

    <form class="filter-bar" method="get" th:action="@{/billets}">
        <select class="form-select" name="statut">
            <option value="">Tous les statuts</option>
            <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}" th:selected="${s == statut}"></option>
        </select>
        <button class="btn btn-outline-primary" type="submit">Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/billets}">Reset</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Date achat</th>
                <th>Film</th>
                <th>Seance</th>
                <th>Prix</th>
                <th>Statut</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="billet : ${billets}">
                <td th:text="${billet.id}">1</td>
                <td th:text="${#temporals.format(billet.dateAchat, 'dd/MM/yyyy HH:mm')}">Date</td>
                <td class="fw-semibold" th:text="${billet.seance.film.titre}">Film</td>
                <td>
                    <span th:text="${billet.seance.salle}">Salle</span>,
                    <span th:text="${#temporals.format(billet.seance.dateHeure, 'dd/MM/yyyy HH:mm')}">Date</span>
                </td>
                <td><span th:text="${billet.prix}">0</span> DH</td>
                <td>
                    <span class="badge" th:classappend="${billet.statut.name() == 'VENDU'} ? ' text-bg-success' : ' text-bg-secondary'" th:text="${billet.statut}">VENDU</span>
                </td>
                <td class="text-end">
                    <form class="d-inline" method="post" th:if="${billet.statut.name() == 'VENDU'}" th:action="@{/billets/{id}/cancel(id=${billet.id})}">
                        <button class="btn btn-sm btn-outline-warning" type="submit">Annuler</button>
                    </form>
                    <form class="d-inline" method="post" th:action="@{/billets/{id}/delete(id=${billet.id})}">
                        <button class="btn btn-sm btn-outline-danger" type="submit">Supprimer</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(billets)}">
                <td colspan="7" class="text-center text-muted py-4">Aucun billet trouve.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
