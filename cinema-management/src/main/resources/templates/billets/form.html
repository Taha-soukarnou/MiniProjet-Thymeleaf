<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vendre un billet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="form-panel">
        <h1>Vendre un billet</h1>
        <form method="post" th:action="@{/billets}" th:object="${billet}">
            <div class="mb-3">
                <label class="form-label" for="seance">Seance</label>
                <select id="seance" class="form-select" th:field="*{seance}" required>
                    <option value="">Choisir une seance</option>
                    <option th:each="seance : ${seances}"
                            th:value="${seance.id}"
                            th:text="${seance.film.titre + ' - ' + seance.salle + ' - ' + #temporals.format(seance.dateHeure, 'dd/MM/yyyy HH:mm') + ' - ' + seance.version}">
                    </option>
                </select>
                <div class="invalid-text" th:if="${#fields.hasErrors('seance')}" th:errors="*{seance}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="prix">Prix</label>
                <input id="prix" class="form-control" type="number" min="0.01" step="0.01" th:field="*{prix}" required>
                <div class="invalid-text" th:if="${#fields.hasErrors('prix')}" th:errors="*{prix}"></div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-success" type="submit">Vendre</button>
                <a class="btn btn-outline-secondary" th:href="@{/billets}">Annuler</a>
            </div>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
