<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - Cinema Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="page-header">
        <h1>Dashboard</h1>
        <p>Vue generale de l'activite du cinema.</p>
    </div>

    <div class="row g-3">
        <div class="col-md-3">
            <div class="metric">
                <span>Films</span>
                <strong th:text="${filmCount}">0</strong>
            </div>
        </div>
        <div class="col-md-3">
            <div class="metric">
                <span>Seances</span>
                <strong th:text="${seanceCount}">0</strong>
            </div>
        </div>
        <div class="col-md-3">
            <div class="metric">
                <span>Billets</span>
                <strong th:text="${billetCount}">0</strong>
            </div>
        </div>
        <div class="col-md-3">
            <div class="metric">
                <span>Recettes</span>
                <strong><span th:text="${totalRecettes}">0</span> DH</strong>
            </div>
        </div>
    </div>

    <div class="quick-actions mt-4">
        <a class="btn btn-primary" th:href="@{/films/new}">Ajouter un film</a>
        <a class="btn btn-primary" th:href="@{/seances/new}">Planifier une seance</a>
        <a class="btn btn-success" th:href="@{/billets/new}">Vendre un billet</a>
        <a class="btn btn-outline-dark" th:href="@{/stats}">Voir les statistiques</a>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
