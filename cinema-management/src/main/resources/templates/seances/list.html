<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seances</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="page-header d-flex justify-content-between align-items-center gap-3">
        <div>
            <h1>Seances</h1>
            <p>Planning des projections par salle et version.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/seances/new}">Planifier</a>
    </div>

    <form class="filter-bar" method="get" th:action="@{/seances}">
        <input class="form-control" type="text" name="salle" placeholder="Salle" th:value="${salle}">
        <input class="form-control" type="date" name="date" th:value="${date}">
        <button class="btn btn-outline-primary" type="submit">Filtrer</button>
        <a class="btn btn-outline-secondary" th:href="@{/seances}">Reset</a>
    </form>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Date et heure</th>
                <th>Film</th>
                <th>Salle</th>
                <th>Version</th>
                <th>Capacite</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="seance : ${seances}">
                <td th:text="${seance.id}">1</td>
                <td th:text="${#temporals.format(seance.dateHeure, 'dd/MM/yyyy HH:mm')}">Date</td>
                <td class="fw-semibold" th:text="${seance.film.titre}">Film</td>
                <td th:text="${seance.salle}">Salle</td>
                <td><span class="badge text-bg-dark" th:text="${seance.version}">VF</span></td>
                <td th:text="${seance.capaciteSalle}">100</td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/seances/{id}/edit(id=${seance.id})}">Modifier</a>
                    <form class="d-inline" method="post" th:action="@{/seances/{id}/delete(id=${seance.id})}">
                        <button class="btn btn-sm btn-outline-danger" type="submit">Supprimer</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(seances)}">
                <td colspan="7" class="text-center text-muted py-4">Aucune seance trouvee.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
