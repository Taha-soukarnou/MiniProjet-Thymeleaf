<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="form-panel">
        <h1 th:text="${pageTitle}">Film</h1>
        <form method="post" th:action="@{/films}" th:object="${film}">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label class="form-label" for="titre">Titre</label>
                <input id="titre" class="form-control" th:field="*{titre}" required>
                <div class="invalid-text" th:if="${#fields.hasErrors('titre')}" th:errors="*{titre}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="genre">Genre</label>
                <input id="genre" class="form-control" th:field="*{genre}" required>
                <div class="invalid-text" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="dureeMin">Duree en minutes</label>
                <input id="dureeMin" class="form-control" type="number" min="1" th:field="*{dureeMin}" required>
                <div class="invalid-text" th:if="${#fields.hasErrors('dureeMin')}" th:errors="*{dureeMin}"></div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit">Enregistrer</button>
                <a class="btn btn-outline-secondary" th:href="@{/films}">Annuler</a>
            </div>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
